; =============================================================================
; PlatformIO Configuration – ESP32-S3 Music Player
; =============================================================================
; Target  : ESP32-S3-DevKitC-1  (dual-core LX7, 16 MB flash, 8 MB OPI PSRAM)
; Framework: Arduino
; =============================================================================

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; -----------------------------------------------------------------------------
; Flash & PSRAM configuration
; -----------------------------------------------------------------------------
; QIO flash mode at 80 MHz for maximum throughput.
; OPI (Octal SPI) PSRAM enabled – required for large DMA / audio buffers.
board_build.flash_mode       = qio
board_build.f_flash          = 80000000L
board_build.arduino.memory_type = qio_opi       ; QIO flash + OPI PSRAM

; 16 MB flash – use the "huge_app" partition table so the application
; partition is large enough for OTA + SPIFFS/LittleFS if needed.
board_build.partitions       = default_16MB.csv
board_upload.flash_size      = 16MB

; -----------------------------------------------------------------------------
; Build flags
; -----------------------------------------------------------------------------
build_flags =
    -DBOARD_HAS_PSRAM                   ; Enable PSRAM support in Arduino core
    -DCONFIG_SPIRAM_USE_MALLOC=1        ; Allow malloc() to fall back to PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1         ; Route Serial output over native USB-CDC

; -----------------------------------------------------------------------------
; Serial monitor
; -----------------------------------------------------------------------------
monitor_speed = 115200

; -----------------------------------------------------------------------------
; Upload
; -----------------------------------------------------------------------------
upload_speed = 921600

; -----------------------------------------------------------------------------
; Library dependencies
; -----------------------------------------------------------------------------
lib_deps =
    ; Helix MP3 / AAC decoder – lightweight, fixed-point, ideal for MCUs
    https://github.com/pschatzmann/arduino-libhelix.git
